<body>
<h2>🔬 NDL XML デバッグ</h2>
<button onclick="run()">ワンピースで実行</button>
<div id="out"></div>

<script>
async function run() {
  const out = document.getElementById('out');
  out.innerHTML = '<p>通信中...</p>';
  
  try {
    const url = 'https://ndlsearch.ndl.go.jp/api/opensearch?q=' + encodeURIComponent('ワンピース') + '&cnt=5&mediatype=Book';
    const r = await fetch(url);
    const text = await r.text();
    
    let html = '';
    
    // 1. 生データ先頭
    html += '<h3>① 生データ（先頭500文字）</h3>';
    html += '<pre>' + esc(text.slice(0, 500)) + '</pre>';

```
// 2. XMLパース
const xml = new DOMParser().parseFromString(text, 'application/xml');
const parseError = xml.querySelector('parsererror');
html += '<h3>② パースエラー</h3>';
html += '<pre class="' + (parseError ? 'ng' : 'ok') + '">' + (parseError ? esc(parseError.textContent.slice(0,200)) : 'なし（正常）') + '</pre>';

// 3. ルート要素
html += '<h3>③ ルート要素</h3>';
html += '<pre>' + esc(xml.documentElement.tagName) + '</pre>';

// 4. 全タグ名一覧（上位20個）
const allTags = [...xml.querySelectorAll('*')].slice(0,20).map(el => el.tagName);
html += '<h3>④ 全タグ名（先頭20）</h3>';
html += '<pre>' + esc(allTags.join(', ')) + '</pre>';

// 5. item要素数（各方法）
const m1 = xml.getElementsByTagName('item').length;
const m2 = xml.querySelectorAll('item').length;
const channel = xml.getElementsByTagName('channel')[0];
const m3 = channel ? channel.getElementsByTagName('item').length : 'channelなし';
html += '<h3>⑤ item要素数</h3>';
html += '<pre>getElementsByTagName: ' + m1 + '\nquerySelectorAll: ' + m2 + '\nchannel内: ' + m3 + '</pre>';

// 6. 最初のitem内容
const firstItem = xml.getElementsByTagName('item')[0];
if (firstItem) {
  html += '<h3>⑥ 最初のitem（全テキスト）</h3>';
  html += '<pre class="ok">' + esc(firstItem.textContent.slice(0, 400)) + '</pre>';
}

out.innerHTML = html;

} catch(e) {
out.innerHTML = ’<pre class="ng">例外: ’ + esc(e.message) + ‘</pre>’;
}
}

function esc(s) {
return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);
}
</script>

</body>
