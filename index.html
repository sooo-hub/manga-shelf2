<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検索テスト</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; }
input { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 8px; }
button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; background: #007aff; color: white; margin-bottom: 8px; }
pre { background: white; border-radius: 10px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 12px; line-height: 1.5; }
</style>
</head>
<body>
<h2>🔍 検索テスト</h2>
<input type="text" id="q" value="ワンピース" placeholder="タイトル">
<button onclick="go()">検索してRAWデータ表示</button>
<pre id="out">ここに結果が出ます</pre>
<script>
async function go() {
  const q = document.getElementById('q').value;
  const out = document.getElementById('out');
  out.textContent = '通信中...';
  try {
    const url = 'https://ndlsearch.ndl.go.jp/api/opensearch?q=' + encodeURIComponent(q) + '&cnt=3&mediatype=Book';
    out.textContent = 'URL: ' + url + '\n\n取得中...';
    const r = await fetch(url);
    out.textContent += '\nステータス: ' + r.status + '\n\n';
    const text = await r.text();
    out.textContent += '--- 先頭800文字 ---\n' + text.slice(0, 800);
  } catch(e) {
    out.textContent = 'エラー: ' + e.message;
  }
}
</script>
</body>
</html>
