<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenBD テスト</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; }
input { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 8px; box-sizing: border-box; }
button { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; background: #007aff; color: white; margin-bottom: 6px; }
pre { background: white; border-radius: 10px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 11px; line-height: 1.5; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>OpenBD + Google Books テスト</h2>
<input type="text" id="q" value="ワンピース 尾田栄一郎" placeholder="タイトル">

<button onclick="testOpenBD()">① OpenBD /search （キーワード）</button>
<button onclick="testGoogle()">② Google Books（制限なし）</button>
<button onclick="testRakuten()">③ 楽天ブックスAPI</button>

<pre id="out">ボタンを押してください</pre>

<script>
const out = () => document.getElementById('out');
const q = () => document.getElementById('q').value.trim();

async function testOpenBD() {
  out().textContent = '通信中...';
  try {
    // OpenBD search API
    const url = 'https://api.openbd.jp/v1/search?title=' + encodeURIComponent(q()) + '&limit=5';
    out().textContent = 'URL: ' + url + '\n\n';
    const r = await fetch(url);
    const text = await r.text();
    out().textContent += 'Status: ' + r.status + '\n先頭500文字:\n' + text.slice(0,500);
  } catch(e) { out().textContent = 'エラー: ' + e.message; }
}

async function testGoogle() {
  out().textContent = '通信中...';
  try {
    // Google Books - no langRestrict, simple q
    const url = 'https://www.googleapis.com/books/v1/volumes?q=' + encodeURIComponent(q()) + '&maxResults=5';
    out().textContent = 'URL: ' + url + '\n\n';
    const r = await fetch(url);
    const d = await r.json();
    const items = d.items || [];
    const titles = items.map(i => (i.volumeInfo?.title || '') + ' / ' + (i.volumeInfo?.authors||[]).join(','));
    out().textContent += 'total: ' + d.totalItems + '\nタイトル:\n' + (titles.join('\n') || '(なし)');
  } catch(e) { out().textContent = 'エラー: ' + e.message; }
}

async function testRakuten() {
  out().textContent = '通信中...';
  try {
    // 楽天ブックス書籍API（applicationId不要のテスト）
    const url = 'https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&title=' + encodeURIComponent(q()) + '&applicationId=1001';
    out().textContent = 'URL: ' + url + '\n\n';
    const r = await fetch(url);
    const text = await r.text();
    out().textContent += 'Status: ' + r.status + '\n先頭300文字:\n' + text.slice(0,300);
  } catch(e) { out().textContent = 'エラー: ' + e.message; }
}
</script>

</body>
</html>
