<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検索テスト v4</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; }
input { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 8px; box-sizing: border-box; }
button { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; background: #007aff; color: white; margin-bottom: 6px; }
pre { background: white; border-radius: 10px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 11px; line-height: 1.5; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>🔍 タイトル絞り込みテスト</h2>
<input type="text" id="q" value="ワンピース" placeholder="タイトル">
<button onclick="t('q=title%3A{q}&cnt=5')">① q=title:ワンピース</button>
<button onclick="t('q={q}&title={q}&cnt=5')">② q=ワンピース&title=ワンピース</button>
<button onclick="t('title={q}&cnt=5')">③ title=ワンピース のみ</button>
<button onclick="t('q={q}&any={q}&cnt=5')">④ q=ワンピース&any=ワンピース</button>
<pre id="out">ボタンを押してください</pre>

<script>
async function t(pattern) {
  const q = document.getElementById('q').value;
  const out = document.getElementById('out');
  const params = pattern.replace(/{q}/g, encodeURIComponent(q));
  const url = 'https://ndlsearch.ndl.go.jp/api/opensearch?' + params;
  out.textContent = 'URL: ' + url + '\n\n通信中...';
  try {
    const r = await fetch(url);
    const text = await r.text();
    const total = (text.match(/<openSearch:totalResults>(\d+)/) || [])[1] || '?';
    // itemのtitleだけ抽出
    const titles = [];
    const re = /<item>[\s\S]*?<title>([\s\S]*?)<\/title>/g;
    let m;
    while ((m = re.exec(text)) !== null && titles.length < 5) {
      titles.push(m[1].trim());
    }
    out.textContent = 'URL: ' + url + '\n\ntotal: ' + total + '\nタイトル:\n' + (titles.join('\n') || '(なし)');
  } catch(e) {
    out.textContent = 'エラー: ' + e.message;
  }
}
</script>

</body>
</html>
