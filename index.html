<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="本棚">
<title>本棚</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --owned: #34c759;
  --wish: #af52de;
  --accent: #ff3b30;
  --blue: #007aff;
  --text: #1c1c1e;
  --sub: #8e8e93;
  --sep: #e5e5ea;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  min-height: 100vh;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
}

/* HEADER */
.header {
background: rgba(242,242,247,0.9);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 0.5px solid var(–sep);
position: sticky; top: 0; z-index: 50;
padding: calc(12px + env(safe-area-inset-top,0px)) 16px 10px;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.btn-add {
background: var(–blue); border: none; border-radius: 20px;
color: white; font-size: 15px; font-weight: 600; cursor: pointer;
padding: 8px 16px;
display: flex; align-items: center; justify-content: center; gap: 4px;
box-shadow: 0 2px 10px rgba(0,122,255,0.4);
white-space: nowrap;
}
.btn-add:active { opacity: 0.75; transform: scale(0.95); }
.search-wrap { position: relative; }
.search-wrap input {
width: 100%; padding: 8px 12px 8px 32px;
background: rgba(118,118,128,0.12); border: none; border-radius: 10px;
font-size: 15px; font-family: inherit; color: var(–text); outline: none;
}
.search-wrap input::placeholder { color: var(–sub); }
.search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }

/* TABS */
.tabs { display: flex; gap: 6px; padding: 10px 16px 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; background: var(–card); border: none; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-family: inherit; color: var(–sub); font-weight: 500; cursor: pointer; }
.tab.on { background: var(–blue); color: white; }

/* STATS */
.stats { display: flex; gap: 8px; padding: 4px 16px 8px; }
.stat { flex: 1; background: var(–card); border-radius: 12px; padding: 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; }
.stat-l { font-size: 11px; color: var(–sub); margin-top: 1px; }

/* SORT */
.sort-row { display: flex; justify-content: flex-end; padding: 0 16px 4px; }
.sort-btn { background: none; border: none; font-size: 13px; color: var(–blue); font-family: inherit; cursor: pointer; padding: 4px 0; }

/* LIST */
main { padding: 0 16px 20px; }
.empty { text-align: center; padding: 80px 20px; color: var(–sub); }
.empty .ico { font-size: 52px; margin-bottom: 12px; }
.empty p { font-size: 15px; line-height: 1.7; }

/* CARD */
.card { background: var(–card); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
.card-body { display: flex; gap: 12px; padding: 12px 12px 8px; }
.cover {
width: 62px; height: 88px; border-radius: 8px; flex-shrink: 0;
background: linear-gradient(145deg,#3a3a3c,#1c1c1e);
display: flex; align-items: center; justify-content: center;
font-size: 26px; overflow: hidden;
box-shadow: 2px 2px 8px rgba(0,0,0,0.18);
}
.cover img { width: 100%; height: 100%; object-fit: cover; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.card-author { font-size: 12px; color: var(–sub); margin-bottom: 7px; }

.prog-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.prog-owned { font-size: 13px; font-weight: 600; color: var(–owned); }
.prog-total { font-size: 11px; color: var(–sub); }
.prog-bar { height: 3px; background: var(–sep); border-radius: 2px; margin-bottom: 6px; }
.prog-fill { height: 100%; background: var(–owned); border-radius: 2px; }

.vols { display: flex; flex-wrap: wrap; gap: 3px; }
.vb {
width: 26px; height: 26px; border-radius: 6px;
border: 1.5px solid var(–sep); background: var(–bg);
font-size: 9px; font-weight: 700; color: var(–sub);
cursor: pointer; display: flex; align-items: center; justify-content: center;
font-family: inherit;
}
.vb:active { transform: scale(0.82); }
.vb.o { background: var(–owned); border-color: var(–owned); color: white; }
.vb.w { background: rgba(175,82,222,0.12); border-color: var(–wish); border-style: dashed; color: var(–wish); }
.vb-more { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(–sep); background: var(–bg); font-size: 9px; color: var(–sub); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }

.card-meta { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 12px 8px; }
.m-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(–bg); color: var(–sub); }
.m-tag.loc { color: #ff9500; }
.m-tag.wsh { color: var(–wish); }

.card-btns { display: flex; border-top: 0.5px solid var(–sep); }
.c-btn { flex: 1; background: none; border: none; padding: 10px 0; font-size: 12px; color: var(–blue); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 3px; }
.c-btn:active { background: var(–bg); }
.c-btn + .c-btn { border-left: 0.5px solid var(–sep); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; }
.overlay.on { display: flex; }
.sheet {
background: #f2f2f7; width: 100%; border-radius: 12px 12px 0 0;
max-height: 94vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
animation: up 0.26s cubic-bezier(0.25,0.46,0.45,0.94);
padding-bottom: calc(16px + env(safe-area-inset-bottom,0px));
}
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

.mnav {
display: flex; align-items: center; justify-content: space-between;
padding: 14px 16px 10px; position: sticky; top: 0;
background: #f2f2f7; z-index: 1;
border-bottom: 0.5px solid var(–sep);
}
.mnav-title { font-size: 17px; font-weight: 600; }
.mnav-btn { background: none; border: none; font-size: 16px; color: var(–blue); font-family: inherit; cursor: pointer; padding: 4px 2px; }
.mnav-btn.save { font-weight: 700; }

/* FORM GROUPS */
.fsec { background: white; border-radius: 12px; margin: 12px 16px 0; overflow: hidden; }
.frow {
display: flex; align-items: center;
padding: 11px 16px; min-height: 44px;
border-bottom: 0.5px solid var(–sep);
}
.frow:last-child { border-bottom: none; }
.frow-lbl { font-size: 15px; width: 76px; flex-shrink: 0; }
.frow input, .frow textarea {
flex: 1; border: none; outline: none;
font-size: 15px; font-family: inherit; color: var(–text);
background: transparent; text-align: right; min-width: 0;
}
.frow input::placeholder, .frow textarea::placeholder { color: var(–sub); }
.frow textarea { text-align: left; resize: none; min-height: 56px; line-height: 1.5; }

/* SEARCH */
.s-sec { margin: 12px 16px 0; }
.s-cover-box { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
.s-cover-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
.s-cover-img { width: 40px; height: 56px; border-radius: 6px; object-fit: cover; }
.s-cover-info { flex: 1; min-width: 0; }
.s-cover-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-cover-sub { font-size: 12px; color: var(–sub); margin-top: 2px; }
.s-clear { color: var(–accent); font-size: 13px; cursor: pointer; flex-shrink: 0; }

.s-btn {
width: 100%; background: white; border: none; border-radius: 12px;
padding: 13px 16px; font-size: 15px; font-family: inherit;
color: var(–blue); font-weight: 600; cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 6px;
margin-bottom: 8px;
}
.s-btn:active { opacity: 0.7; }

.s-results { background: white; border-radius: 12px; overflow: hidden; display: none; }
.s-results.on { display: block; }
.sri {
display: flex; align-items: center; gap: 12px;
padding: 10px 16px; border-bottom: 0.5px solid var(–sep); cursor: pointer;
}
.sri:last-child { border-bottom: none; }
.sri:active { background: var(–bg); }
.sri-img { width: 38px; height: 52px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: var(–sep); }
.sri-ph { width: 38px; height: 52px; border-radius: 5px; background: linear-gradient(145deg,#3a3a3c,#1c1c1e); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.sri-t { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sri-s { font-size: 12px; color: var(–sub); margin-top: 2px; }
.s-empty { padding: 20px; text-align: center; color: var(–sub); font-size: 14px; line-height: 1.6; }

/* VOL EDITOR */
.vsec { margin: 12px 16px 0; }
.vsec-head { display: flex; justify-content: space-between; align-items: center; padding: 0 4px 8px; }
.vsec-title { font-size: 13px; color: var(–sub); font-weight: 500; }
.vsec-acts { display: flex; gap: 8px; }
.va-btn { background: white; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-family: inherit; color: var(–blue); font-weight: 600; cursor: pointer; }
.va-btn.clr { color: var(–sub); }

.v-legend { display: flex; gap: 12px; padding: 0 4px 8px; }
.vli { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(–sub); }
.vld { width: 10px; height: 10px; border-radius: 3px; }

.vgrid { display: flex; flex-wrap: wrap; gap: 5px; }
.ve {
width: 44px; height: 44px; border-radius: 10px;
border: 1.5px solid var(–sep); background: var(–bg);
display: flex; flex-direction: column; align-items: center; justify-content: center;
cursor: pointer; font-family: inherit; gap: 1px;
}
.ve:active { transform: scale(0.86); }
.ve .vn { font-size: 13px; font-weight: 700; color: var(–sub); }
.ve .vi { font-size: 9px; color: transparent; }
.ve.o { background: var(–owned); border-color: var(–owned); }
.ve.o .vn { color: white; }
.ve.o .vi { color: rgba(255,255,255,0.8); }
.ve.w { background: rgba(175,82,222,0.1); border-color: var(–wish); border-style: dashed; }
.ve.w .vn { color: var(–wish); }
.ve.w .vi { color: var(–wish); }
.v-hint { font-size: 11px; color: var(–sub); text-align: center; padding: 8px 4px 0; }

/* DELETE */
.del-sec { margin: 12px 16px 0; }
.del-btn { width: 100%; background: white; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-family: inherit; color: var(–accent); cursor: pointer; }
.del-btn:active { opacity: 0.7; }

/* TOAST */
.toast {
position: fixed; bottom: calc(24px + env(safe-area-inset-bottom,0px));
left: 50%; transform: translateX(-50%) translateY(60px);
background: rgba(28,28,30,0.92); color: white;
padding: 9px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
z-index: 500; white-space: nowrap;
transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.toast.on { transform: translateX(-50%) translateY(0); }

/* LOADING */
#lo {
position: fixed; inset: 0; background: #f2f2f7; z-index: 400;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
.spin { width: 28px; height: 28px; border: 3px solid var(–sep); border-top-color: var(–blue); border-radius: 50%; animation: sp 0.7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
</style>

</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC-91dSm0tN07yebTc-HFTh1_x5XG5kbA",
  authDomain: "manga-shelf2.firebaseapp.com",
  databaseURL: "https://manga-shelf2-default-rtdb.firebaseio.com",
  projectId: "manga-shelf2",
  storageBucket: "manga-shelf2.firebasestorage.app",
  messagingSenderId: "88029773460",
  appId: "1:88029773460:web:53e9ae085f9831db32fe81",
  measurementId: "G-REVTL1ZZWJ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const mRef = ref(db, 'mangas');

let mangas = [], sortMode = 0, filterMode = 'all', evs = {};
const SORTS = ['タイトル','著者','進捗','更新'];

// Firebase sync
function save(data) {
  const o = {}; data.forEach(m => o[m.id] = m);
  set(mRef, o).catch(() => toast('保存エラー'));
}
onValue(mRef, s => {
  mangas = s.val() ? Object.values(s.val()) : [];
  document.getElementById('lo').style.display = 'none';
  renderStats(); renderList();
}, () => {
  document.getElementById('lo').innerHTML = '<div style="color:#ff3b30;font-size:14px;text-align:center">接続エラー<br>ページを再読み込みしてください</div>';
});

// Stats
function renderStats() {
  const vols = mangas.reduce((s,m)=>s+Object.values(m.volumes||{}).filter(v=>v==='owned').length, 0);
  const wc = mangas.filter(m=>Object.values(m.volumes||{}).some(v=>v==='wish')).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${mangas.length}</div><div class="stat-l">作品</div></div>
    <div class="stat"><div class="stat-n">${vols}</div><div class="stat-l">冊所持</div></div>
    <div class="stat"><div class="stat-n">${wc}</div><div class="stat-l">欲しい</div></div>`;
}

// Filter / Sort
window.setFilter = (mode, btn) => {
  filterMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  renderList();
};
window.cycleSort = () => {
  sortMode = (sortMode + 1) % SORTS.length;
  document.getElementById('sortLbl').textContent = SORTS[sortMode];
  renderList();
};
const pct = m => m.latest ? Object.values(m.volumes||{}).filter(v=>v==='owned').length / m.latest : 0;

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = mangas;
  if (q) list = list.filter(m => (m.title||'').toLowerCase().includes(q) || (m.author||'').toLowerCase().includes(q));
  if (filterMode === 'incomplete') list = list.filter(m => m.latest && Object.values(m.volumes||{}).filter(v=>v==='owned').length < m.latest);
  if (filterMode === 'wishlist') list = list.filter(m => Object.values(m.volumes||{}).some(v=>v==='wish'));
  list = [...list].sort((a,b) => {
    if (sortMode===0) return (a.title||'').localeCompare(b.title||'','ja');
    if (sortMode===1) return (a.author||'').localeCompare(b.author||'','ja');
    if (sortMode===2) return pct(b)-pct(a);
    return (b.updatedAt||0)-(a.updatedAt||0);
  });
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="ico">📚</div><p>${mangas.length===0?'「＋」ボタンでマンガを追加しましょう':'条件に一致する作品がありません'}</p></div>`;
    return;
  }
  el.innerHTML = list.map(card).join('');
}

function card(m) {
  const vols = m.volumes||{}, lat = m.latest||0;
  const owned = Object.values(vols).filter(v=>v==='owned').length;
  const wc = Object.values(vols).filter(v=>v==='wish').length;
  const p = lat ? Math.min(100, Math.round(owned/lat*100)) : 0;
  const total = Math.max(lat, ...Object.keys(vols).map(Number).filter(Boolean), 0);
  const maxShow = 16;
  let vbs = '';
  for (let i=1; i<=Math.min(total,maxShow); i++) {
    const s = vols[i]||'none';
    vbs += `<button class="vb ${s==='owned'?'o':s==='wish'?'w':''}" onclick="qToggle('${m.id}',${i})">${i}</button>`;
  }
  if (total > maxShow) vbs += `<button class="vb-more" onclick="openEdit('${m.id}')">+${total-maxShow}</button>`;
  const cov = m.coverUrl ? `<div class="cover"><img src="${e(m.coverUrl)}" onerror="this.parentNode.innerHTML='📖'"></div>` : '<div class="cover">📖</div>';
  const tags = [
    m.location ? `<span class="m-tag loc">📍 ${e(m.location)}</span>` : '',
    m.note ? `<span class="m-tag">📝 ${e(m.note.slice(0,24))}${m.note.length>24?'…':''}</span>` : '',
    wc ? `<span class="m-tag wsh">♡ 欲しい ${wc}冊</span>` : '',
  ].filter(Boolean).join('');
  return `<div class="card">
    <div class="card-body">
      ${cov}
      <div class="card-info">
        <div class="card-title">${e(m.title||'（無題）')}</div>
        <div class="card-author">${e(m.author||'')}</div>
        <div class="prog-row"><span class="prog-owned">${owned}冊所持</span><span class="prog-total">${lat?`全${lat}巻`:'巻数未設定'}</span></div>
        ${lat?`<div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div>`:''}
        <div class="vols">${vbs}</div>
      </div>
    </div>
    ${tags?`<div class="card-meta">${tags}</div>`:''}
    <div class="card-btns">
      <button class="c-btn" onclick="refreshLatest('${m.id}')">🔄 最新刊確認</button>
      <button class="c-btn" onclick="openEdit('${m.id}')">✏️ 編集</button>
    </div>
  </div>`;
}

// Quick toggle
window.qToggle = (id, vol) => {
  const m = mangas.find(x=>x.id===id); if (!m) return;
  if (!m.volumes) m.volumes = {};
  const cur = m.volumes[vol]||'none';
  m.volumes[vol] = cur==='none'?'owned':cur==='owned'?'wish':'none';
  m.updatedAt = Date.now();
  update(ref(db,'mangas/'+id), {volumes:m.volumes, updatedAt:m.updatedAt});
  renderList(); renderStats();
};

// Google Books search (CORS対応済み)
window.searchBooks = async () => {
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { toast('タイトルを入力してください'); return; }
  const sb = document.getElementById('sBtn'), sr = document.getElementById('sResults');
  sb.textContent = '検索中...';
  sr.className = 's-results'; sr.innerHTML = '';
  try {
    // Google Books API - proper CORS support, great for Japanese manga
    const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&langRestrict=ja&maxResults=8&printType=books&orderBy=relevance`;
    const r = await fetch(url);
    const data = await r.json();
    const items = (data.items || []).slice(0, 8);
    if (!items.length) {
      sr.innerHTML = '<div class="s-empty">見つかりませんでした<br>手動で入力してください</div>';
    } else {
      sr.innerHTML = items.map((it,i) => {
        const info = it.volumeInfo || {};
        const t = info.title || '';
        const au = (info.authors || []).join(', ');
        // Use thumbnail and upgrade to https
        const img = (info.imageLinks?.thumbnail || '').replace('http://','https://');
        return `<div class="sri" onclick="pickBook(${i})" id="b${i}" data-t="${ea(t)}" data-a="${ea(au)}" data-c="${ea(img)}">
          ${img
            ? `<img class="sri-img" src="${e(img)}" onerror="this.outerHTML='<div class=sri-ph>📖</div>'">`
            : '<div class="sri-ph">📖</div>'}
          <div style="flex:1;min-width:0"><div class="sri-t">${e(t)}</div><div class="sri-s">${e(au)}</div></div>
          <div style="color:var(--sub);font-size:16px">›</div>
        </div>`;
      }).join('');
    }
    sr.classList.add('on');
  } catch(err) {
    sr.innerHTML = `<div class="s-empty">⚠️ 取得できませんでした<br>手動で入力してください</div>`;
    sr.classList.add('on');
  }
  sb.textContent = '🔍 書誌情報を検索';
};

window.pickBook = i => {
  const el = document.getElementById('b'+i); if (!el) return;
  const t = el.dataset.t, a = el.dataset.a, c = el.dataset.c;
  document.getElementById('iTitle').value = t;
  document.getElementById('iAuthor').value = a;
  document.getElementById('iCover').value = c;
  const cb = document.getElementById('coverBox'), cr = document.getElementById('coverRow');
  cr.innerHTML = `${c?`<img class="s-cover-img" src="${e(c)}" onerror="this.style.display='none'">`:''}
    <div class="s-cover-info"><div class="s-cover-title">${e(t)}</div><div class="s-cover-sub">${e(a)}</div></div>
    <div class="s-clear" onclick="clearCover()">✕</div>`;
  cb.style.display = 'block';
  document.getElementById('sResults').classList.remove('on');
  updateVE(); toast('選択しました ✓');
};

window.clearCover = () => {
  document.getElementById('coverBox').style.display = 'none';
  document.getElementById('iCover').value = '';
};

// Refresh latest
window.refreshLatest = async id => {
  const m = mangas.find(x=>x.id===id); if (!m||!m.title) { toast('タイトルが設定されていません'); return; }
  toast('🔄 確認中...');
  try {
    const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(m.title)}&langRestrict=ja&maxResults=40&printType=books`);
    const data = await r.json();
    let max = 0;
    (data.items||[]).forEach(it => {
      const t = it.volumeInfo?.title || '';
      const mt = t.match(/(\d+)\s*[巻冊]/);
      if (mt) max = Math.max(max, parseInt(mt[1]));
    });
    if (max > 0 && max !== m.latest) {
      m.latest = max; m.updatedAt = Date.now();
      update(ref(db,'mangas/'+id), {latest:max, updatedAt:m.updatedAt});
      renderList(); renderStats(); toast(`最新刊を ${max}巻 に更新 ✓`);
    } else {
      toast(max>0 ? `最新は ${m.latest||max}巻 のままです` : '巻数情報が見つかりませんでした');
    }
  } catch { toast('取得に失敗しました'); }
};

// Vol editor
function updateVE() {
  const n = parseInt(document.getElementById('iLatest').value)||0;
  const g = document.getElementById('vGrid'), h = document.getElementById('vHint');
  if (n < 1) { g.innerHTML=''; h.textContent='「最新刊」に巻数を入力すると巻ごとに設定できます'; return; }
  h.textContent='タップで「所持 → 欲しい → 未所持」と切り替え';
  g.innerHTML = '';
  for (let i=1;i<=n;i++) {
    const s=evs[i]||'none', icon=s==='owned'?'✓':s==='wish'?'♡':'';
    const b=document.createElement('button');
    b.className=`ve ${s==='owned'?'o':s==='wish'?'w':''}`;
    b.innerHTML=`<span class="vn">${i}</span><span class="vi">${icon}</span>`;
    b.onclick=()=>{evs[i]=evs[i]==='none'||!evs[i]?'owned':evs[i]==='owned'?'wish':'none'; updateVE();};
    g.appendChild(b);
  }
}
window.setAllOwned=()=>{ const n=parseInt(document.getElementById('iLatest').value)||0; for(let i=1;i<=n;i++) evs[i]='owned'; updateVE(); };
window.clearAllVol=()=>{ evs={}; updateVE(); };

// Modal
function resetModal() {
  ['iTitle','iAuthor','iLoc','iNote'].forEach(id => document.getElementById(id).value='');
  document.getElementById('iLatest').value='';
  document.getElementById('iCover').value='';
  document.getElementById('iId').value='';
  document.getElementById('coverBox').style.display='none';
  document.getElementById('sResults').className='s-results';
  document.getElementById('sResults').innerHTML='';
  document.getElementById('sBtn').textContent='🔍 書誌情報を検索';
  evs={}; updateVE();
}
window.openAdd = () => {
  resetModal();
  document.getElementById('mtitle').textContent='追加';
  document.getElementById('delSec').style.display='none';
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('iTitle').focus(), 350);
};
window.openEdit = id => {
  const m = mangas.find(x=>x.id===id); if (!m) return;
  resetModal();
  document.getElementById('mtitle').textContent='編集';
  document.getElementById('iTitle').value=m.title||'';
  document.getElementById('iAuthor').value=m.author||'';
  document.getElementById('iLatest').value=m.latest||'';
  document.getElementById('iLoc').value=m.location||'';
  document.getElementById('iNote').value=m.note||'';
  document.getElementById('iCover').value=m.coverUrl||'';
  document.getElementById('iId').value=id;
  document.getElementById('delSec').style.display='block';
  document.getElementById('sBtn').textContent='🔍 書誌情報を再検索';
  if (m.coverUrl) {
    document.getElementById('coverRow').innerHTML=`
      <img class="s-cover-img" src="${e(m.coverUrl)}" onerror="this.style.display='none'">
      <div class="s-cover-info"><div class="s-cover-title">${e(m.title)}</div><div class="s-cover-sub">${e(m.author||'')}</div></div>
      <div class="s-clear" onclick="clearCover()">✕</div>`;
    document.getElementById('coverBox').style.display='block';
  }
  evs={...(m.volumes||{})}; updateVE();
  document.getElementById('overlay').classList.add('on');
};
window.closeModal = () => document.getElementById('overlay').classList.remove('on');
window.handleOverlay = e => { if (e.target===document.getElementById('overlay')) closeModal(); };

// Save
window.saveManga = () => {
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { toast('タイトルを入力してください'); document.getElementById('iTitle').focus(); return; }
  const eid = document.getElementById('iId').value;
  const latest = parseInt(document.getElementById('iLatest').value)||0;
  const data = { title, author:document.getElementById('iAuthor').value.trim(), latest, location:document.getElementById('iLoc').value.trim(), note:document.getElementById('iNote').value.trim(), coverUrl:document.getElementById('iCover').value, volumes:{...evs}, updatedAt:Date.now() };
  if (eid) {
    const idx = mangas.findIndex(x=>x.id===eid);
    if (idx!==-1) mangas[idx]={...mangas[idx],...data};
  } else {
    mangas.push({id:'m'+Date.now()+Math.random().toString(36).slice(2,5), createdAt:Date.now(), ...data});
  }
  save(mangas); closeModal(); toast(eid?'更新しました ✓':'追加しました ✓');
};

// Delete
window.deleteManga = () => {
  const id = document.getElementById('iId').value; if (!id) return;
  if (!confirm('削除しますか？')) return;
  mangas = mangas.filter(x=>x.id!==id);
  remove(ref(db,'mangas/'+id));
  renderList(); renderStats(); closeModal(); toast('削除しました');
};

// Utils
function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2400);
}

document.getElementById('iLatest').addEventListener('input', updateVE);
</script>

</body>
